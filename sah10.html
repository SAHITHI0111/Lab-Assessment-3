<!DOCTYPE html>
<html>
<head>
    <title>Checkbox Selection</title>
</head>
<body>

    <h2>Select Subjects</h2>

    <input type="checkbox" value="Math"> Math<br>
    <input type="checkbox" value="Science"> Science<br>
    <input type="checkbox" value="English"> English<br>
    <input type="checkbox" value="Computer"> Computer<br><br>

    <button onclick="showSelection()">Show Selection</button>

    <p id="result"></p>

    <script>
        function showSelection() {

            var checkboxes = document.querySelectorAll('input[type="checkbox"]');
            var selectedSubjects = [];
            var count = 0;

            for (var i = 0; i < checkboxes.length; i++) {
                if (checkboxes[i].checked) {
                    selectedSubjects.push(checkboxes[i].value);
                    count++;
                }
            }

            document.getElementById("result").innerHTML =
                "Selected Subjects: " + selectedSubjects.join(", ") +
                "<br>Total Selected: " + count;
        }
    </script>

</body>
</html>
