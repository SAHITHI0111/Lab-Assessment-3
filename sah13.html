<!DOCTYPE html>
<html>
<head>
    <title>Product Order Form</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        fieldset {
            margin-bottom: 15px;
            padding: 10px;
        }

        legend {
            font-weight: bold;
        }

        button {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>Product Order Form</h2>

<form id="orderForm">

    <fieldset>
        <legend>Electronics</legend>
        <input type="checkbox" class="item" value="Laptop-55000"> Laptop - ₹55000<br>
        <input type="checkbox" class="item" value="Phone-20000"> Phone - ₹20000<br>
    </fieldset>

    <fieldset>
        <legend>Accessories</legend>
        <input type="checkbox" class="item" value="Headphones-2000"> Headphones - ₹2000<br>
        <input type="checkbox" class="item" value="Mouse-500"> Mouse - ₹500<br>
    </fieldset>

    <fieldset>
        <legend>Home Items</legend>
        <input type="checkbox" class="item" value="Chair-3000"> Chair - ₹3000<br>
        <input type="checkbox" class="item" value="Lamp-1000"> Lamp - ₹1000<br>
    </fieldset>

    <button type="button" onclick="calculateTotal()">Calculate Total</button>

</form>

<h3 id="result"></h3>

<script>
    function calculateTotal() {

        var items = document.querySelectorAll(".item");
        var total = 0;
        var selectedItems = [];

        for (let item of items) {
            if (item.checked) {

                let parts = item.value.split("-");
                let price = parseFloat(parts[1]);

                total += price;
                selectedItems.push(parts[0]);
            }
        }

        document.getElementById("result").innerHTML =
            "Selected Items: " + selectedItems.join(", ") +
            "<br>Total Price: ₹" + total;
    }
</script>

</body>
</html>
