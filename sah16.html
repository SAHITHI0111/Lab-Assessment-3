<!DOCTYPE html>
<html>
<head>
    <title>Overlapping Image Gallery</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .container {
            position: relative;
            width: 500px;
            height: 300px;
            border: 2px solid black;
        }

        .imgBox {
            position: absolute;
            width: 150px;
            height: 150px;
            cursor: pointer;
            transition: 0.3s;
        }

        #img1 { top: 20px; left: 20px; }
        #img2 { top: 60px; left: 80px; }
        #img3 { top: 100px; left: 140px; }
    </style>
</head>

<body>

<h2>Overlapping Image Gallery</h2>

<div class="container">
    <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?w=300" id="img1" class="imgBox" onclick="bringToFront(this)">
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=300" id="img2" class="imgBox" onclick="bringToFront(this)">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=300" id="img3" class="imgBox" onclick="bringToFront(this)">
</div>

<script>
    var topZIndex = 1;

    function bringToFront(element) {
        element.style.zIndex = ++topZIndex;
    }
</script>

</body>
</html>
