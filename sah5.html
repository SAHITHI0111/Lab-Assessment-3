<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
</head>
<body>

    <h2>Calculator</h2>

    <form>
        Number 1:
        <input type="number" id="num1" step="any"><br><br>

        Number 2:
        <input type="number" id="num2" step="any"><br><br>

        <button type="button" onclick="calculate('+')">Add</button>
        <button type="button" onclick="calculate('-')">Subtract</button>
        <button type="button" onclick="calculate('*')">Multiply</button>
        <button type="button" onclick="calculate('/')">Divide</button>
    </form>

    <h3 id="result"></h3>

    <script>
        function calculate(operator) {

            var num1 = parseFloat(document.getElementById("num1").value);
            var num2 = parseFloat(document.getElementById("num2").value);
            var result;
            switch(operator) {
                case '+':
                    result = num1 + num2;
                    break;

                case '-':
                    result = num1 - num2;
                    break;

                case '*':
                    result = num1 * num2;
                    break;

                case '/':
                    if (num2 === 0) {
                        result = "Cannot divide by zero!";
                    } else {
                        result = num1 / num2;
                    }
                    break;

                default:
                    result = "Invalid operation";
            }

            document.getElementById("result").innerHTML = "Result: " + result;
        }
    </script>

</body>
</html>
