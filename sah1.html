<!DOCTYPE html>
<html>
<head>
    <title>Hello World Button</title>
</head>

<body>

<h2 id="demo">Click the button below</h2>

<button onclick="showMessage()">Click Me</button>

<script>
    function showMessage() {
        var text = "Hello, world!";
        document.getElementById("demo").outerHTML = "<h2>" + text + "</h2>";
    }
</script>

</body>
</html>
